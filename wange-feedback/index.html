<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户反馈 - WanGe AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f0fe 100%);
            min-height: 100vh;
            padding: 60px 20px;
            color: #1a1a1a;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #1a1a1a;
        }
        
        .header p {
            color: #666;
            font-size: 1rem;
        }
        
        .form-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 82, 217, 0.08);
        }
        
        .form-group {
            margin-bottom: 30px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #1a1a1a;
            font-size: 0.95rem;
        }
        
        .required {
            color: #0052D9;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 14px 18px;
            background: #f5f7fa;
            border: 2px solid #e8ecf1;
            border-radius: 10px;
            color: #1a1a1a;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0052D9;
            background: #fff;
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        select option {
            background: #fff;
            color: #1a1a1a;
        }
        
        .rating-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .rating-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #e8ecf1;
            background: #f5f7fa;
            color: #666;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .rating-btn:hover, .rating-btn.active {
            border-color: #0052D9;
            background: #0052D9;
            color: #fff;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #0052D9;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-btn:hover {
            background: #0045b8;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 82, 217, 0.3);
        }
        
        .contact-info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            text-align: center;
        }
        
        .contact-info p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .contact-info a {
            color: #0052D9;
            text-decoration: none;
        }
        
        .success-msg {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .success-msg.show {
            display: block;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e8f0fe 0%, #d4e4ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
        }
        
        .success-msg h2 {
            color: #0052D9;
            margin-bottom: 10px;
        }
        
        .success-msg p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 用户反馈</h1>
            <p>您的意见是我们前进的动力</p>
        </div>
        
        <div class="form-card">
            <form id="feedbackForm">
                <div class="form-group">
                    <label>您的称呼 <span class="required">*</span></label>
                    <input type="text" placeholder="请输入您的姓名" required>
                </div>
                
                <div class="form-group">
                    <label>联系方式 <span class="required">*</span></label>
                    <input type="text" placeholder="手机号 / 微信 / 邮箱" required>
                </div>
                
                <div class="form-group">
                    <label>反馈类型</label>
                    <select>
                        <option value="">请选择类型</option>
                        <option value="suggestion">功能建议</option>
                        <option value="bug">问题反馈</option>
                        <option value="cooperation">商务合作</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>满意度评分</label>
                    <div class="rating-group">
                        <button type="button" class="rating-btn" data-rating="1">1</button>
                        <button type="button" class="rating-btn" data-rating="2">2</button>
                        <button type="button" class="rating-btn" data-rating="3">3</button>
                        <button type="button" class="rating-btn" data-rating="4">4</button>
                        <button type="button" class="rating-btn" data-rating="5">5</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>详细内容 <span class="required">*</span></label>
                    <textarea placeholder="请详细描述您的建议或问题..." required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">提交反馈</button>
            </form>
            
            <div class="success-msg" id="successMsg">
                <div class="success-icon">✓</div>
                <h2>感谢您的反馈！</h2>
                <p>我们会尽快处理并与您联系</p>
            </div>
        </div>
        
        <div class="contact-info">
            <p>也可以直接联系我们</p>
            <p>邮箱：<a href="mailto:190647625@qq.com">190647625@qq.com</a></p>
        </div>
    </div>
    
    <script>
        // 评分按钮交互
        document.querySelectorAll('.rating-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // 表单提交
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('feedbackForm').style.display = 'none';
            document.getElementById('successMsg').classList.add('show');
        });
    </script>
</body>
</html>
