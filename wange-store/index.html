<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanGe AI 资源站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0052D9;
            --primary-dark: #0045b8;
            --danger: #ff4d4f;
            --success: #52c41a;
            --bg: #f5f7fa;
            --card: #fff;
            --text: #1a1a1a;
            --text-secondary: #666;
            --border: #e8e8e8;
            --shadow: 0 4px 20px rgba(0, 82, 217, 0.08);
            --shadow-lg: 0 8px 40px rgba(0, 82, 217, 0.15);
            --radius: 16px;
            --radius-sm: 8px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        /* 导航 */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            z-index: 100;
        }
        
        .logo { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        
        /* 按钮基础样式 */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        
        .btn-primary:hover { background: var(--primary-dark); }
        
        .btn-secondary {
            background: #fff;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        
        .btn-secondary:hover { background: rgba(0,82,217,0.05); }
        
        .btn-ghost {
            background: transparent;
            color: var(--text);
        }
        
        .btn-ghost:hover { background: rgba(0,0,0,0.05); }
        
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #ff7875; }
        
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #73d13d; }
        
        .btn-lg { padding: 14px 32px; font-size: 1rem; }
        
        /* 购物车按钮 */
        .cart-btn { position: relative; }
        
        .cart-count {
            position: absolute;
            top: -8px; right: -8px;
            width: 20px; height: 20px;
            background: var(--danger);
            color: #fff;
            border-radius: 50%;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Hero */
        .hero {
            padding: 140px 40px 80px;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f0fe 100%);
        }
        
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto 32px;
        }
        
        /* 产品区 */
        .section {
            padding: 60px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        
        /* 卡片 */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        
        .card-cover {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background: linear-gradient(135deg, #e8f0fe 0%, #f5f7fa 100%);
            position: relative;
        }
        
        .card-badge {
            position: absolute;
            top: 12px; left: 12px;
            padding: 4px 12px;
            background: var(--danger);
            color: #fff;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .card-body {
            padding: 24px;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .card-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .price {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        
        .price-current {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--danger);
        }
        
        .price-original {
            font-size: 0.9rem;
            color: #999;
            text-decoration: line-through;
        }
        
        /* 弹窗遮罩 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        /* 弹窗 */
        .modal {
            background: #fff;
            border-radius: var(--radius);
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow: auto;
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-header {
            padding: 24px 24px 0;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 16px; right: 16px;
            width: 32px; height: 32px;
            border: none;
            background: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover { background: rgba(0,0,0,0.05); }
        
        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .modal-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .modal-footer {
            padding: 0 24px 24px;
            display: flex;
            gap: 12px;
        }
        
        .modal-footer .btn { flex: 1; }
        
        /* 表单 */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }
        
        .tab {
            padding: 8px 16px;
            border: none;
            background: none;
            font-size: 0.95rem;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.3s;
        }
        
        .tab.active {
            background: rgba(0,82,217,0.1);
            color: var(--primary);
            font-weight: 500;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 购物车侧边栏 */
        .cart-sidebar {
            position: fixed;
            top: 0; right: -400px;
            width: 380px; max-width: 90vw;
            height: 100%;
            background: #fff;
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            z-index: 1010;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .cart-sidebar.show { right: 0; }
        
        .cart-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cart-header h3 { font-size: 1.1rem; }
        
        .cart-items {
            flex: 1;
            overflow: auto;
            padding: 16px 24px;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .cart-item-icon {
            width: 48px; height: 48px;
            border-radius: var(--radius-sm);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .cart-item-info { flex: 1; }
        
        .cart-item-name { font-weight: 500; margin-bottom: 2px; }
        
        .cart-item-price { color: var(--danger); font-size: 0.9rem; }
        
        .cart-item-remove {
            width: 28px; height: 28px;
            border: none;
            background: none;
            color: #999;
            cursor: pointer;
            border-radius: 50%;
        }
        
        .cart-item-remove:hover { background: rgba(255,77,79,0.1); color: var(--danger); }
        
        .cart-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .cart-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        
        .cart-total-price { font-size: 1.4rem; font-weight: 700; color: var(--danger); }
        
        /* 支付方式 */
        .payment-methods {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .payment-method {
            flex: 1;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .payment-method:hover { border-color: var(--primary); }
        
        .payment-method.active {
            border-color: var(--primary);
            background: rgba(0,82,217,0.05);
        }
        
        .payment-method-icon { font-size: 2rem; margin-bottom: 8px; }
        
        /* 下载列表 */
        .download-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .download-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg);
            border-radius: var(--radius-sm);
        }
        
        .download-item-icon { font-size: 1.5rem; }
        
        .download-item-info { flex: 1; }
        
        .download-item-name { font-weight: 500; margin-bottom: 2px; }
        
        .download-item-size { color: var(--text-secondary); font-size: 0.85rem; }
        
        /* 页脚 */
        footer {
            padding: 40px;
            text-align: center;
            background: #fff;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            nav { padding: 12px 20px; }
            .logo { font-size: 1.1rem; }
            
            .hero { padding: 120px 20px 60px; }
            .hero h1 { font-size: 1.8rem; }
            .hero p { font-size: 1rem; }
            
            .section { padding: 40px 20px; }
            .section-title { font-size: 1.5rem; }
            
            .products-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .modal { max-width: 100%; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav>
        <div class="logo">📚 WanGe AI资源站</div>
        <div class="nav-right">
            <button class="btn btn-primary cart-btn" onclick="toggleCart()">
                🛒 购物车
                <span class="cart-count" id="cartCount">0</span>
            </button>
            <button class="btn btn-secondary" id="authBtn" onclick="showAuth()">登录</button>
            <div id="userInfo" style="display:none;align-items:center;gap:8px;">
                <span id="userName"></span>
                <button class="btn btn-ghost" onclick="logout()">退出</button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1>AI 学习资源一站式获取</h1>
        <p>精选 AI 提示词、工具包、学习资料，助力你的 AI 之旅</p>
        <button class="btn btn-primary btn-lg" onclick="scrollToProducts()">浏览资源</button>
    </section>

    <!-- 产品区 -->
    <section class="section" id="products">
        <h2 class="section-title">🔥 热门资源</h2>
        <div class="products-grid" id="productsGrid">
            <!-- 产品卡片由 JS 生成 -->
        </div>
    </section>

    <!-- 登录/注册弹窗 -->
    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <div class="modal-header">
                <button class="modal-close" onclick="closeAuth()">×</button>
                <div class="modal-title" id="authTitle">欢迎登录</div>
                <div class="modal-subtitle">登录后享受更多权益</div>
            </div>
            <div class="modal-body">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('login')">登录</button>
                    <button class="tab" onclick="switchTab('register')">注册</button>
                </div>
                
                <!-- 登录表单 -->
                <div class="tab-content active" id="loginTab">
                    <div class="form-group">
                        <label class="form-label">用户名 / 邮箱</label>
                        <input type="text" class="form-input" id="loginUser" placeholder="请输入用户名或邮箱">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="loginPass" placeholder="请输入密码">
                    </div>
                    <button class="btn btn-primary btn-lg" style="width:100%" onclick="handleLogin()">登录</button>
                </div>
                
                <!-- 注册表单 -->
                <div class="tab-content" id="registerTab">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-input" id="regUser" placeholder="设置用户名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-input" id="regEmail" placeholder="输入邮箱">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="regPass" placeholder="设置密码（至少6位）">
                    </div>
                    <button class="btn btn-primary btn-lg" style="width:100%" onclick="handleRegister()">注册</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 购物车侧边栏 -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>🛒 购物车</h3>
            <button class="modal-close" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">购物车是空的</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>合计</span>
                <span class="cart-total-price" id="cartTotal">¥0</span>
            </div>
            <button class="btn btn-primary btn-lg" style="width:100%" onclick="showPayment()" id="checkoutBtn" disabled>去结算</button>
        </div>
    </div>

    <!-- 支付弹窗 -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal">
            <div class="modal-header">
                <button class="modal-close" onclick="closePayment()">×</button>
                <div class="modal-title">确认订单</div>
                <div class="modal-subtitle">订单号: <span id="orderId"></span></div>
            </div>
            <div class="modal-body">
                <div style="background:var(--bg);padding:16px;border-radius:var(--radius-sm);margin-bottom:20px;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                        <span>商品数量</span>
                        <span id="orderCount">0 件</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:600;">
                        <span>应付金额</span>
                        <span style="color:var(--danger)" id="orderAmount">¥0</span>
                    </div>
                </div>
                
                <div class="form-label" style="margin-bottom:12px;">选择支付方式</div>
                <div class="payment-methods">
                    <div class="payment-method active" onclick="selectPayment('wechat')">
                        <div class="payment-method-icon">💚</div>
                        <div>微信支付</div>
                    </div>
                    <div class="payment-method" onclick="selectPayment('alipay')">
                        <div class="payment-method-icon">💙</div>
                        <div>支付宝</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePayment()">取消</button>
                <button class="btn btn-primary" onclick="processPayment()">立即支付</button>
            </div>
        </div>
    </div>

    <!-- 支付成功弹窗 -->
    <div class="modal-overlay" id="successModal">
        <div class="modal" style="text-align:center;">
            <div class="modal-body">
                <div style="font-size:4rem;margin-bottom:16px;">🎉</div>
                <div class="modal-title">支付成功！</div>
                <div class="modal-subtitle" style="margin-bottom:24px;">感谢您的购买</div>
                
                <div class="download-list" id="downloadList">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="modal-footer" style="flex-direction:column;">
                <button class="btn btn-primary btn-lg" style="width:100%" onclick="downloadAll()">⬇️ 打包下载全部</button>
                <button class="btn btn-secondary" style="width:100%" onclick="closeSuccess()">完成</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 WanGe AIGC. All rights reserved.</p>
        <p>本站所有资源仅供学习交流使用</p>
    </footer>

    <script>
        // 数据
        const products = [
            { id: 1, name: 'ChatGPT 提示词大全', desc: '1000+ 精选提示词，覆盖办公、编程、创作等场景', price: 29.9, original: 99, icon: '🤖', badge: '热销' },
            { id: 2, name: 'Midjourney 提示词库', desc: '500+ 艺术风格提示词，附效果图', price: 19.9, original: 59, icon: '🎨', badge: '推荐' },
            { id: 3, name: 'AI 工具导航合集', desc: '收录 200+ 实用 AI 工具，分类整理', price: 9.9, original: 29, icon: '🧰', badge: '新品' },
            { id: 4, name: 'Stable Diffusion 模型包', desc: '精选大模型 + LoRA + 工作流', price: 39.9, original: 129, icon: '🖼️', badge: null },
            { id: 5, name: 'AI 写作助手模板', desc: '小红书、公众号、知乎等爆款文案模板', price: 15.9, original: 49, icon: '✍️', badge: null },
            { id: 6, name: 'AI 视频制作教程', desc: '从入门到精通，含素材包', price: 49.9, original: 199, icon: '🎬', badge: '精品' }
        ];

        let cart = [];
        let currentUser = null;
        let currentPayment = 'wechat';

        // 初始化
        function init() {
            renderProducts();
            checkLoginStatus();
        }

        // 渲染产品
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <div class="card-cover">
                        ${p.badge ? `<span class="card-badge">${p.badge}</span>` : ''}
                        ${p.icon}
                    </div>
                    <div class="card-body">
                        <div class="card-title">${p.name}</div>
                        <div class="card-desc">${p.desc}</div>
                        <div class="card-footer">
                            <div class="price">
                                <span class="price-current">¥${p.price}</span>
                                <span class="price-original">¥${p.original}</span>
                            </div>
                            <button class="btn btn-primary" onclick="addToCart(${p.id})">加入购物车</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 检查登录状态
        function checkLoginStatus() {
            const saved = localStorage.getItem('wangeUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                updateUserUI();
            }
        }

        // 更新用户UI
        function updateUserUI() {
            const authBtn = document.getElementById('authBtn');
            const userInfo = document.getElementById('userInfo');
            const userName = document.getElementById('userName');
            
            if (currentUser) {
                authBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                userName.textContent = `👤 ${currentUser.name}`;
            } else {
                authBtn.style.display = 'inline-flex';
                userInfo.style.display = 'none';
            }
        }

        // 登录相关
        function showAuth() {
            document.getElementById('authModal').classList.add('show');
        }

        function closeAuth() {
            document.getElementById('authModal').classList.remove('show');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('authTitle').textContent = '欢迎登录';
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('authTitle').textContent = '注册账号';
            }
        }

        function handleLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            
            if (!user || !pass) {
                alert('请填写完整信息');
                return;
            }
            
            currentUser = { name: user, email: user };
            localStorage.setItem('wangeUser', JSON.stringify(currentUser));
            updateUserUI();
            closeAuth();
            alert('登录成功！');
        }

        function handleRegister() {
            const user = document.getElementById('regUser').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            
            if (!user || !email || !pass) {
                alert('请填写完整信息');
                return;
            }
            if (pass.length < 6) {
                alert('密码至少6位');
                return;
            }
            
            currentUser = { name: user, email: email };
            localStorage.setItem('wangeUser', JSON.stringify(currentUser));
            updateUserUI();
            closeAuth();
            alert('注册成功！已自动登录');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('wangeUser');
            updateUserUI();
            alert('已退出登录');
        }

        // 购物车
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('show');
        }

        function addToCart(productId) {
            if (!currentUser) {
                showAuth();
                return;
            }
            
            const product = products.find(p => p.id === productId);
            cart.push({ ...product, cartId: Date.now() });
            updateCart();
            
            // 显示购物车
            document.getElementById('cartSidebar').classList.add('show');
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            updateCart();
        }

        function updateCart() {
            const count = document.getElementById('cartCount');
            const items = document.getElementById('cartItems');
            const total = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');
            
            count.textContent = cart.length;
            
            if (cart.length === 0) {
                items.innerHTML = '<div class="cart-empty">购物车是空的</div>';
                total.textContent = '¥0';
                checkoutBtn.disabled = true;
            } else {
                items.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-icon">${item.icon}</div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">¥${item.price}</div>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${item.cartId})">×</button>
                    </div>
                `).join('');
                
                const sum = cart.reduce((s, i) => s + i.price, 0);
                total.textContent = `¥${sum.toFixed(1)}`;
                checkoutBtn.disabled = false;
            }
        }

        // 支付
        function showPayment() {
            if (cart.length === 0) return;
            
            const orderId = 'WG' + Date.now().toString().slice(-10);
            document.getElementById('orderId').textContent = orderId;
            document.getElementById('orderCount').textContent = cart.length + ' 件';
            document.getElementById('orderAmount').textContent = '¥' + cart.reduce((s, i) => s + i.price, 0).toFixed(1);
            
            document.getElementById('cartSidebar').classList.remove('show');
            document.getElementById('paymentModal').classList.add('show');
        }

        function closePayment() {
            document.getElementById('paymentModal').classList.remove('show');
        }

        function selectPayment(method) {
            currentPayment = method;
            document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function processPayment() {
            // 生成下载列表
            const list = document.getElementById('downloadList');
            list.innerHTML = cart.map(item => `
                <div class="download-item">
                    <div class="download-item-icon">${item.icon}</div>
                    <div class="download-item-info">
                        <div class="download-item-name">${item.name}</div>
                        <div class="download-item-size">点击下载</div>
                    </div>
                    <button class="btn btn-primary" onclick="downloadItem('${item.name}')">下载</button>
                </div>
            `).join('');
            
            closePayment();
            document.getElementById('successModal').classList.add('show');
        }

        function closeSuccess() {
            document.getElementById('successModal').classList.remove('show');
            cart = [];
            updateCart();
        }

        function downloadItem(name) {
            alert(`开始下载: ${name}\n（演示功能）`);
        }

        function downloadAll() {
            alert('开始打包下载全部资源\n（演示功能）');
        }

        function scrollToProducts() {
            document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
        }

        // 启动
        init();
    </script>
</body>
</html>
