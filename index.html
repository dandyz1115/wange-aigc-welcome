<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万歌AIGC</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* 金色渐变背景线条 */
        .bg-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, transparent 49.5%, rgba(212, 175, 55, 0.03) 49.5%, rgba(212, 175, 55, 0.03) 50.5%, transparent 50.5%),
                linear-gradient(0deg, transparent 49.5%, rgba(212, 175, 55, 0.03) 49.5%, rgba(212, 175, 55, 0.03) 50.5%, transparent 50.5%);
            background-size: 80px 80px;
            pointer-events: none;
        }
        
        .container {
            text-align: center;
            padding: 80px 100px;
            position: relative;
            border: 1px solid rgba(212, 175, 55, 0.15);
            background: rgba(0, 0, 0, 0.3);
        }
        
        /* 顶部装饰线 */
        .container::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }
        
        /* 底部装饰线 */
        .container::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }
        
        /* Logo - 金色几何图形 */
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 50px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .logo-shape {
            width: 80px;
            height: 80px;
            border: 2px solid #d4af37;
            position: relative;
            transform: rotate(45deg);
        }
        
        .logo-shape::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 1px solid #d4af37;
        }
        
        .logo-text {
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #d4af37;
            letter-spacing: 0.3em;
            font-weight: 600;
        }
        
        /* 主标题 */
        h1 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: 0.4em;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        
        /* 分隔线 */
        .divider {
            width: 60px;
            height: 1px;
            background: #d4af37;
            margin: 30px auto;
        }
        
        /* 副标题 */
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            font-style: italic;
        }
        
        /* 底部品牌标识 */
        .brand-mark {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(212, 175, 55, 0.4);
            font-size: 0.75rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
        }
        
        /* 左右装饰点 */
        .corner-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #d4af37;
            border-radius: 50%;
        }
        
        .corner-dot.top-left { top: 15px; left: 15px; }
        .corner-dot.top-right { top: 15px; right: 15px; }
        .corner-dot.bottom-left { bottom: 15px; left: 15px; }
        .corner-dot.bottom-right { bottom: 15px; right: 15px; }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .container {
            animation: fadeIn 2s ease-out;
        }
    </style>
</head>
<body>
    <div class="bg-lines"></div>
    <div class="container">
        <div class="corner-dot top-left"></div>
        <div class="corner-dot top-right"></div>
        <div class="corner-dot bottom-left"></div>
        <div class="corner-dot bottom-right"></div>
        
        <!-- Logo -->
        <div class="logo">
            <div class="logo-shape"></div>
            <span class="logo-text">W</span>
        </div>
        
        <h1>欢迎来到万歌AIGC</h1>
        
        <div class="divider"></div>
        
        <p class="subtitle">AI · 艺术 · 未来</p>
        
        <span class="brand-mark">WANGE AIGC</span>
    </div>
</body>
</html>
