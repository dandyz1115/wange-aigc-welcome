<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万歌AIGC</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            padding: 80px 100px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 60px rgba(0, 82, 217, 0.08);
            position: relative;
            max-width: 600px;
        }
        
        /* 腾讯蓝装饰条 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #0052D9, #266FE8, #0052D9);
            border-radius: 20px 20px 0 0;
        }
        
        /* Logo */
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #0052D9 0%, #266FE8 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: #fff;
            font-weight: 700;
        }
        
        /* 主标题 */
        h1 {
            color: #1a1a1a;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
        }
        
        /* 分隔线 */
        .divider {
            width: 50px;
            height: 3px;
            background: #0052D9;
            margin: 25px auto;
            border-radius: 2px;
        }
        
        /* 副标题 */
        .subtitle {
            color: #666;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.1em;
        }
        
        /* 底部品牌标识 */
        .brand-mark {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }
        
        .brand-mark span {
            color: #0052D9;
            font-weight: 500;
        }
        
        /* 装饰圆点 */
        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 25px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #0052D9;
            opacity: 0.3;
        }
        
        .dot:nth-child(2) {
            opacity: 0.6;
        }
        
        .dot:nth-child(3) {
            opacity: 1;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .container {
            animation: fadeIn 1s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">W</div>
        
        <h1>欢迎来到万歌AIGC</h1>
        
        <div class="divider"></div>
        
        <p class="subtitle">科技向善 · AI 赋能未来</p>
        
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <div class="brand-mark">
            Powered by <span>WanGe AIGC</span>
        </div>
    </div>
</body>
</html>
