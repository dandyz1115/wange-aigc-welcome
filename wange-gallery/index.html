<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanGe AI Gallery | AI 艺术画廊</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        
        /* Header */
        header {
            padding: 40px 60px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #d4af37;
            letter-spacing: 0.3em;
            font-weight: 600;
        }
        
        .nav {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            letter-spacing: 0.15em;
        }
        
        /* Hero Section */
        .hero {
            padding: 100px 60px;
            text-align: center;
            position: relative;
        }
        
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: #d4af37;
            letter-spacing: 0.2em;
            font-weight: 400;
            margin-bottom: 30px;
        }
        
        .hero-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            letter-spacing: 0.15em;
            font-style: italic;
            margin-bottom: 50px;
        }
        
        .divider {
            width: 100px;
            height: 1px;
            background: #d4af37;
            margin: 0 auto;
        }
        
        /* Gallery Grid */
        .gallery {
            padding: 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }
        
        .artwork {
            position: relative;
            aspect-ratio: 4/5;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 1px solid rgba(212, 175, 55, 0.15);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s ease;
        }
        
        .artwork:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-5px);
        }
        
        /* CSS Art Piece 1 - Golden Flow */
        .art-1::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(212, 175, 55, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(212, 175, 55, 0.2) 0%, transparent 50%),
                linear-gradient(45deg, transparent 40%, rgba(212, 175, 55, 0.1) 45%, transparent 50%);
            animation: flow1 8s ease-in-out infinite;
        }
        
        @keyframes flow1 {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* CSS Art Piece 2 - Geometric Harmony */
        .art-2::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(45deg, transparent 48%, rgba(212, 175, 55, 0.2) 49%, rgba(212, 175, 55, 0.2) 51%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(212, 175, 55, 0.15) 49%, rgba(212, 175, 55, 0.15) 51%, transparent 52%),
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.25) 0%, transparent 30%);
        }
        
        .art-2::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border: 2px solid rgba(212, 175, 55, 0.6);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.3; }
        }
        
        /* CSS Art Piece 3 - Abstract Waves */
        .art-3::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 30px,
                    rgba(212, 175, 55, 0.03) 30px,
                    rgba(212, 175, 55, 0.03) 31px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 30px,
                    rgba(212, 175, 55, 0.03) 30px,
                    rgba(212, 175, 55, 0.03) 31px
                );
            animation: wave 20s linear infinite;
        }
        
        @keyframes wave {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .art-3::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.4) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        /* CSS Art Piece 4 - Minimalist Lines */
        .art-4::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 45%, rgba(212, 175, 55, 0.2) 45%, rgba(212, 175, 55, 0.2) 46%, transparent 46%, transparent 54%, rgba(212, 175, 55, 0.2) 54%, rgba(212, 175, 55, 0.2) 55%, transparent 55%);
        }
        
        .art-4::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1px;
            height: 200px;
            background: linear-gradient(180deg, transparent, #d4af37, transparent);
        }
        
        /* Artwork Info */
        .artwork-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        
        .artwork:hover .artwork-info {
            transform: translateY(0);
        }
        
        .artwork-title {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }
        
        .artwork-desc {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }
        
        /* Footer */
        footer {
            padding: 40px 60px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            letter-spacing: 0.15em;
        }
        
        footer span {
            color: rgba(212, 175, 55, 0.6);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">WANGE GALLERY</div>
        <nav class="nav">AI · ART · COLLECTION</nav>
    </header>
    
    <section class="hero">
        <h1 class="hero-title">AI 艺术画廊</h1>
        <p class="hero-subtitle">科技与美学的融合 · 人工智能艺术收藏</p>
        <div class="divider"></div>
    </section>
    
    <section class="gallery">
        <div class="artwork art-1">
            <div class="artwork-info">
                <div class="artwork-title">Golden Flow · 金色流转</div>
                <div class="artwork-desc">AI Generated · Series 001</div>
            </div>
        </div>
        
        <div class="artwork art-2">
            <div class="artwork-info">
                <div class="artwork-title">Geometric Harmony · 几何之美</div>
                <div class="artwork-desc">AI Generated · Series 002</div>
            </div>
        </div>
        
        <div class="artwork art-3">
            <div class="artwork-info">
                <div class="artwork-title">Abstract Waves · 抽象波纹</div>
                <div class="artwork-desc">AI Generated · Series 003</div>
            </div>
        </div>
        
        <div class="artwork art-4">
            <div class="artwork-info">
                <div class="artwork-title">Minimalist Line · 极简线条</div>
                <div class="artwork-desc">AI Generated · Series 004</div>
            </div>
        </div>
    </section>
    
    <footer>
        <span>WANGE AIGC</span> · AI Art Collection · 2026
    </footer>
</body>
</html>
